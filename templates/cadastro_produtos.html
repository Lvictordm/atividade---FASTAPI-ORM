<h1>Cadastrar Produto</h1>
<p class="card-sub">Insira os detalhes técnicos e o preço do item.</p>

<form action="/produtos" method="post">
    <div class="field">
        <label for="nome">Nome do Produto</label>
        <input type="text" id="nome" name="nome" placeholder="Ex: iPhone 15 Pro" required>
    </div>

    <div style="display: flex; gap: 15px;">
        <div class="field" style="flex: 1;">
            <label for="preco">Preço (R$)</label>
            <input type="number" step="0.01" id="preco" name="preco" placeholder="5999.00" required>
        </div>
        <div class="field" style="flex: 1;">
            <label for="estoque">Estoque</label>
            <input type="number" id="estoque" name="estoque" placeholder="10" required>
        </div>
    </div>

    <div class="field">
        <label for="categoria">Categoria Responsável</label>
        <select name="categoria_id" required style="width: 100%; padding: 13px; border-radius: 12px; border: 1.5px solid #e2d6f0; background: #faf7ff;">
            <option value="" disabled selected>Selecione uma categoria...</option>
            {% for cat in categorias %}
                <option value="{{ cat.id }}">{{ cat.nome }}</option>
            {% endfor %}
        </select>
    </div>

    <button type="submit" class="btn-submit">Finalizar Cadastro →</button>
</form>
